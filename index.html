<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Consulta de Activos UNIFIN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
text-align:center;
}

.logo{
max-width:250px;
margin-bottom:20px;
}

h1{
color:#14214a;
}

button{
background:#003366;
color:white;
border:none;
padding:12px 20px;
border-radius:5px;
cursor:pointer;
margin:5px;
}

input{
padding:12px;
width:250px;
border:1px solid #ccc;
border-radius:5px;
}

#reader{
max-width:350px;
margin:20px auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
max-width:600px;
margin:auto;
text-align:left;
}

</style>

</head>

<body>

<img
class="logo"
src="https://i.ibb.co/W4Hm4LNy/unifin-logo-png-seeklogo.png"
>

<h1>Consulta de Activos UNIFIN</h1>

<input
id="codigo"
placeholder="Ejemplo 33436"
>

<button onclick="consultar()">
Buscar
</button>

<div id="reader"></div>

<div id="resultado"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwHgwmHqmqy1Qc_-6tAQM5VAoSyiD9YAJLwnu11hvTMNFf_YLAmtiuIyRO7ScLY42Uu/exec";

async function consultar(){

const codigo =
document.getElementById("codigo")
.value
.trim();

if(!codigo){

alert("Capture un código");

return;

}

document.getElementById("resultado").innerHTML=
`
<div class="card">
Consultando...
</div>
`;

try{

const response =
await fetch(
API_URL +
"?id=" +
encodeURIComponent(codigo)
);

const data =
await response.json();

if(!data.encontrado){

document.getElementById("resultado").innerHTML=
`
<div class="card">
<h2>No encontrado</h2>
<p><b>Código:</b> ${codigo}</p>
</div>
`;

return;

}

document.getElementById("resultado").innerHTML=
`
<div class="card">

<h2>${data.activo}</h2>

<p><b>ID Activo:</b> ${data.id}</p>

<p><b>Cliente:</b> ${data.cliente}</p>

<p><b>Contrato:</b> ${data.contrato}</p>

<p><b>Estatus:</b> ${data.estatus}</p>

</div>
`;

}
catch(error){

document.getElementById("resultado").innerHTML=
`
<div class="card">
<h2>Error</h2>
<p>${error}</p>
</div>
`;

}

}

function onScanSuccess(decodedText){

let valor =
decodedText.trim();

if(valor.includes("?")){

const url =
new URL(valor);

if(url.searchParams.get("audit")){

valor =
url.searchParams.get("audit");

}

}

document.getElementById("codigo").value =
valor;

consultar();

}

const scanner =
new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
