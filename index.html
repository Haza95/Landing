<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Consulta QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
padding:20px;
text-align:center;
background:#f5f5f5;
}

#reader{
max-width:350px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

button{
background:#003366;
color:white;
padding:10px;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Consultar QR</h1>

<div id="reader"></div>

<div id="resultado"></div>

<script>

let scanner;

function iniciarScanner(){

scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
);

scanner.render(onScanSuccess);

}

function onScanSuccess(decodedText){

scanner.clear();

consultar(decodedText.trim());

}

function consultar(id){

fetch(
"https://script.google.com/macros/s/AKfycbx3MdiBFMN0TV1Nu7a5gjgU_s2FE5eqUBUjfwPFA2EEPEVbvskP7CwrBAIJ6f2URch6/exec?id=ACT001" +
encodeURIComponent(id)
)

.then(r => r.json())

.then(data => {

if(!data.encontrado){

document.getElementById("resultado").innerHTML=
`
<div class="card">
<h2>No encontrado</h2>
<p>${id}</p>
</div>
`;

return;

}

document.getElementById("resultado").innerHTML=
`
<div class="card">

<h2>${data.activo}</h2>

<p><b>ID:</b> ${data.id}</p>

<p><b>Cliente:</b> ${data.cliente}</p>

<p><b>Contrato:</b> ${data.contrato}</p>

<p><b>Estatus:</b> ${data.estatus}</p>

</div>
`;

});

}

iniciarScanner();

</script>

</body>
</html>
