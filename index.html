<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Consulta de Activos UNIFIN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f5f5;
text-align:center;
}

h1{
color:#003366;
}

input{
padding:12px;
width:250px;
font-size:18px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 20px;
background:#003366;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

button:hover{
opacity:.9;
}

#reader{
max-width:350px;
margin:20px auto;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
text-align:left;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.ok{
color:green;
font-weight:bold;
}

.error{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Consulta de Activos UNIFIN</h1>

<input
id="codigo"
placeholder="Ejemplo 33434"
autocomplete="off"
>

<br><br>

<button onclick="consultar()">
Buscar
</button>

<button onclick="location.reload()">
Reiniciar
</button>

<div id="reader"></div>

<div id="resultado"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbx3MdiBFMN0TV1Nu7a5gjgU_s2FE5eqUBUjfwPFA2EEPEVbvskP7CwrBAIJ6f2URch6/exec";

async function consultar(){

const id =
document
.getElementById("codigo")
.value
.trim();

if(id===""){

alert("Capture un código");

return;

}

document
.getElementById("resultado")
.innerHTML =
"<div class='card'>Consultando información...</div>";

try{

const response =
await fetch(
API_URL +
"?id=" +
encodeURIComponent(id)
);

const data =
await response.json();

if(!data.encontrado){

document
.getElementById("resultado")
.innerHTML =
`
<div class="card">

<h2>No encontrado</h2>

<p><b>Código:</b> ${id}</p>

</div>
`;

return;

}

document
.getElementById("resultado")
.innerHTML =
`
<div class="card">

<h2>${data.activo}</h2>

<p><b>ID:</b> ${data.id}</p>

<p><b>Cliente:</b> ${data.cliente}</p>

<p><b>Contrato:</b> ${data.contrato}</p>

<p><b>Estatus:</b> ${data.estatus}</p>

<button onclick="location.reload()">
Escanear otro
</button>

</div>
`;

}catch(error){

document
.getElementById("resultado")
.innerHTML =
`
<div class="card">

<h2>Error de conexión</h2>

<p>${error}</p>

</div>
`;

console.error(error);

}

}

function onScanSuccess(decodedText){

document
.getElementById("codigo")
.value =
decodedText.trim();

consultar();

}

const scanner =
new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250,
rememberLastUsedCamera:true
},
false
);

scanner.render(
onScanSuccess
);

document
.getElementById("codigo")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){

consultar();

}

}
);

</script>

</body>

</html>
