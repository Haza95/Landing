<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Consulta Activos</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
text-align:center;
}

input{
padding:12px;
width:250px;
font-size:18px;
}

button{
padding:12px 20px;
background:#003366;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-left:5px;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
text-align:left;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<h1>Consulta de Activos</h1>

<input
id="codigo"
placeholder="Ejemplo ACT001"

>

<button onclick="consultar()">
Buscar
</button>

<div id="resultado"></div>

<script>

function consultar(){

const id =
document.getElementById("codigo")
.value
.trim();

fetch(
"https://script.google.com/macros/s/AKfycbx3MdiBFMN0TV1Nu7a5gjgU_s2FE5eqUBUjfwPFA2EEPEVbvskP7CwrBAIJ6f2URch6/exec?id=" +
encodeURIComponent(id)
)

.then(r=>r.json())

.then(data=>{

if(!data.encontrado){

document.getElementById("resultado").innerHTML=
`
<div class="card">
<h2>No encontrado</h2>
<p>Código: ${id}</p>
</div>
`;

return;

}

document.getElementById("resultado").innerHTML=
`
<div class="card">

<h2>${data.activo}</h2>

<p><b>ID:</b> ${data.id}</p>

<p><b>Cliente:</b> ${data.cliente}</p>

<p><b>Contrato:</b> ${data.contrato}</p>

<p><b>Estatus:</b> ${data.estatus}</p>

</div>
`;

})

.catch(error=>{

document.getElementById("resultado").innerHTML=
`
<div class="card">
<h2>Error</h2>
<p>${error}</p>
</div>
`;

});

}

</script>

</body>
</html>
