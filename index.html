<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Consulta QR UNIFIN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
max-width:280px;
}

#reader{
width:100%;
}

.card{
background:#f8f8f8;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.btn{
display:inline-block;
background:#0033cc;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:8px;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img
src="https://i.ibb.co/W4Hm4LNy/unifin-logo-png-seeklogo.png">

</div>

<h2>Consulta de Activos UNIFIN</h2>

<div id="reader"></div>

<div id="resultado"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyhyTqgRjKogW_gBt_2DGeJb59Q8NGzLfjA5XA8Q15O331OzcIsFNf8uqCmcQ7OyjhX/exec";

function consultarActivo(id){

fetch(
API_URL +
"?id=" +
encodeURIComponent(id)
)

.then(response => response.json())

.then(data => {

if(!data.encontrado){

document.getElementById(
"resultado"
).innerHTML =

"<h3>Activo no encontrado</h3>";

return;

}

document.getElementById(
"resultado"
).innerHTML =

'<div class="card">' +

'<p><b>Cliente:</b> ' +
data.cliente +
'</p>' +

'<p><b>Contrato:</b> ' +
data.contrato +
'</p>' +

'<p><b>Activo:</b> ' +
data.activo +
'</p>' +

'<p><b>ID:</b> ' +
data.id +
'</p>' +

'<p><b>Estatus:</b> ' +
data.estatus +
'</p>' +

'<a class="btn" href="' +
data.linkAuditoria +
'" target="_blank">' +

'Abrir Autoauditoría' +

'</a>' +

'</div>';

});

}

function onScanSuccess(decodedText){

html5QrcodeScanner.clear();

consultarActivo(
decodedText
);

}

let html5QrcodeScanner =

new Html5QrcodeScanner(

"reader",

{
fps:10,
qrbox:250
}

);

html5QrcodeScanner.render(
onScanSuccess
);

</script>

</body>
</html>
